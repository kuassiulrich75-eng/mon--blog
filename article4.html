<h2>Comment fonctionne Google AdSense</h2>

<p>Google AdSense permet de gagner de l’argent avec la publicité sur ton site web.</p>

<h3>Comment ça marche ?</h3>
<p>Google affiche des annonces sur ton site et tu es payé quand les visiteurs cliquent.</p>

<p><strong>Important :</strong> il faut un site de qualité pour être accepté.</p>
